<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextGenZ Tech - Admin Login</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- CSS -->
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-header">
      <h2>Next<span>GenZ</span></h2>
      <p>Secure Portal Login</p>
    </div>
    
    <div id="error-message" class="alert hidden"></div>

    <form id="loginForm">
      <div class="input-group">
        <label for="email">Admin Email</label>
        <input type="email" id="email" required placeholder="admin@nextgenztech.com">
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <div style="position: relative;">
          <input type="password" id="password" required placeholder="••••••••" style="width: 100%; padding-right: 40px;">
          <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888;"></i>
        </div>
      </div>
      <button type="submit" id="loginBtn" class="btn primary-btn">
        <span>Login to Dashboard</span>
        <div class="loader hidden"></div>
      </button>
    </form>
  </div>

  <script src="login.js"></script>
</body>
</html>
