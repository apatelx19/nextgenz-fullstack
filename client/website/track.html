<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Application - NextGenZ Tech</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --paper: #FAF9F5;
            --ink: #272727;
            --primary: #FF4D00;
            --border: rgba(39, 39, 39, 0.12);
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Navbar */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            background: rgba(250, 249, 245, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .navbar {
            max-width: 1300px;
            margin: 0 auto;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--ink);
            object-fit: cover;
        }

        .logo h2 {
            font-family: 'Anton', sans-serif;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: var(--ink);
        }

        .logo h2 span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--ink);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Tracker Section */
        .tracker-section {
            flex: 1;
            padding: 140px 24px 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .tracker-card {
            border: 1px solid var(--ink);
            background: transparent;
            border-radius: 0.5rem;
            padding: 48px;
            width: 100%;
            max-width: 550px;
            box-shadow: 8px 8px 0 var(--primary);
            text-align: center;
        }

        .tracker-header {
            margin-bottom: 32px;
        }

        .tracker-header span {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
            display: block;
        }

        .tracker-header h2 {
            font-family: 'Anton', sans-serif;
            font-size: 2.2rem;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .tracker-header p {
            color: rgba(39, 39, 39, 0.7);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .tracker-form .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .tracker-form label {
            display: block;
            margin-bottom: 8px;
            color: var(--ink);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
        }

        .tracker-form input {
            width: 100%;
            padding: 16px;
            border-radius: 0.25rem;
            border: 1px solid var(--ink);
            background: transparent;
            color: var(--ink);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .tracker-form input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 4px 4px 0 var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: var(--paper);
            border: none;
            border-radius: 0.5rem;
            font-size: 1.05rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 28px;
        }

        .submit-btn:hover {
            transform: translateY(-4px);
            box-shadow: 6px 6px 0 var(--ink);
        }

        /* Results Container */
        #trackerResults {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            display: none;
            animation: fadeIn 0.5s ease;
            text-align: left;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px dashed var(--border);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: rgba(39, 39, 39, 0.7);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .result-value {
            font-weight: 700;
            color: var(--ink);
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'JetBrains Mono', monospace;
        }

        .status-badge.pending {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .status-badge.approved, .status-badge.selected {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-badge.rejected {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.08);
            color: var(--danger);
            padding: 16px;
            border-radius: 0.25rem;
            margin-bottom: 24px;
            text-align: center;
            display: none;
            border: 1px solid var(--danger);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .loader {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
            color: rgba(39, 39, 39, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="/" class="logo">
                <img src="./assets/brand_logo.png" alt="NextGenZ Logo">
                <h2>Next<span>GenZ</span> Tech</h2>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#domains">Internships</a></li>
            </ul>
        </nav>
    </header>

    <section class="tracker-section">
        <div class="tracker-card">
            <div class="tracker-header">
                <span>01 · APPLICATION PORTAL</span>
                <h2>TRACK STATUS</h2>
                <p>Enter email and phone to pull up your status timeline and payment receipt details.</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="trackForm" class="tracker-form">
                <div class="form-group">
                    <label for="trackEmail">Email Address</label>
                    <input type="email" id="trackEmail" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="trackPhone">Phone Number</label>
                    <input type="tel" id="trackPhone" required placeholder="Enter 10-digit phone number">
                </div>
                <button type="submit" id="trackBtn" class="submit-btn">
                    <span class="btn-text">Check Status</span>
                    <div class="loader"></div>
                </button>
            </form>

            <div id="trackerResults">
                <h3 style="margin-bottom: 20px; font-family: 'Anton', sans-serif; font-size: 1.5rem; text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); padding-bottom: 8px;">Application Details</h3>
                
                <div class="result-item">
                    <span class="result-label">Name</span>
                    <span class="result-value" id="resName">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Domain</span>
                    <span class="result-value" id="resDomain">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Payment ID</span>
                    <span class="result-value" id="resPayment" style="font-family: monospace; font-size: 0.9rem; color: var(--primary);">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Applied On</span>
                    <span class="result-value" id="resDate">-</span>
                </div>
                <div class="result-item" style="margin-top: 15px; background: rgba(0,0,0,0.01); border: 1px solid var(--border); padding: 18px; border-radius: 4px;">
                    <span class="result-label" style="color: var(--ink); font-weight: 700; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;">Current Status</span>
                    <span class="result-value" id="resStatus">
                        <span class="status-badge" id="statusBadge">-</span>
                    </span>
                </div>
            </div>
            
            <div>
                <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </section>

    <script src="track.js"></script>
</body>
</html>
