<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | NextGenZ Tech</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper: #FAF9F5;
            --ink: #272727;
            --primary: #FF4D00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card {
            border: 1px solid var(--ink);
            background: transparent;
            border-radius: 0.5rem;
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 8px 8px 0 var(--primary);
            transition: all 0.3s ease;
        }

        .label {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-family: 'Anton', sans-serif;
            font-size: 8rem;
            line-height: 0.9;
            letter-spacing: -0.015em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h2 {
            font-family: 'Anton', sans-serif;
            font-size: 2.2rem;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 24px;
            color: var(--ink);
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 36px;
            color: rgba(39, 39, 39, 0.8);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 36px;
            background-color: var(--primary);
            color: var(--paper);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-decoration: none;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 6px 6px 0 var(--ink);
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="label">Error Code 404</span>
        <h1>LOST</h1>
        <h2>PAGE NOT FOUND</h2>
        <p>The page you are looking for doesn't exist, has been removed, or has been temporarily moved.</p>
        <a href="/" class="btn">Go Back Home 🚀</a>
    </div>
</body>
</html>
